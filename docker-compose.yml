version: "3.9"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopwise
      POSTGRES_PASSWORD: shopwise123
      POSTGRES_DB: shopwise
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: ./backend/ShopWise.Api
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      ConnectionStrings__Default: "Host=db;Database=shopwise;Username=shopwise;Password=shopwise123"
      Jwt__Key: "superSecretKeyThatShouldBeInVaultNotHere"
      Jwt__Issuer: "ShopWise"
      Jwt__Audience: "ShopWise"
      Gemini__ApiKey: "${GEMINI_API_KEY:-}"
    ports:
      - "5100:8080"
    volumes:
      - ./backend/ShopWise.Api:/src
      - api_bin:/src/bin
      - api_obj:/src/obj
    depends_on:
      - db

  recommendations:
    build:
      context: ./backend/recommendations
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://shopwise:shopwise123@db:5432/shopwise"
    ports:
      - "5200:8000"
    volumes:
      - ./backend/recommendations:/app
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend/shopwise-ui
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:5173"
    volumes:
      - ./frontend/shopwise-ui:/app
      - /app/node_modules
    depends_on:
      - api
      - recommendations

  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    command: sleep infinity
    depends_on:
      - db
      - api
      - recommendations
      - frontend

volumes:
  postgres_data:
  api_bin:
  api_obj:
